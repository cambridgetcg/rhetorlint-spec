name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: run the reference-engine test suite (zero dependencies)
        run: npm test
      - name: run the demo
        run: node scripts/demo.mjs
