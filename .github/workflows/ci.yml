name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: run the JS reference-engine test suite (zero dependencies)
        run: npm test
      - name: run the demo
        run: node scripts/demo.mjs
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: cross-engine conformance — the Python engine must match the JS ground truth
        run: python3 impl/python/test_conformance.py
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: cross-engine conformance — the Go engine must match the JS ground truth
        run: go test ./impl/go/...
