name: release

# Publishing should not depend on which device anyone is sitting at.
#
# The interactive path (scripts/publish-npm-interactive.zsh) stays exactly as it
# is and remains the fallback — it is the right tool for a human with a security
# key. This is the other door: tag a release, and the packages the registry does
# not have yet go out on their own.
#
# Authentication is npm Trusted Publishing (OIDC). No npm token is stored in
# this repository. See NPM_DEPLOY.md for the one-time setup on npmjs.com.

on:
  push:
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Resolve versions and report what would publish, without publishing"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # Nothing reaches the registry that has not reproduced across all three
  # engines first. The publish job cannot start unless this one is green.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: run the JS reference-engine test suite (zero dependencies)
        run: npm test
      - name: run the demo
        run: node scripts/demo.mjs
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: cross-engine conformance — the Python engine must match the JS ground truth
        run: python3 impl/python/test_conformance.py
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: cross-engine conformance — the Go engine must match the JS ground truth
        working-directory: impl/go
        run: go test ./...

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: read
      id-token: write # npm Trusted Publishing (OIDC) + provenance attestation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Trusted publishing needs npm >= 11.5.1; Node 22 still ships npm 10.
      - name: install an npm new enough to publish without a token
        run: npm install -g npm@latest && npm --version
      - name: publish the packages the registry does not have yet
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: node scripts/publish-npm-ci.mjs
